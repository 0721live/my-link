<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>限定コンテンツ</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .wrapper {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #ccc; font-size: 0.9rem; margin-bottom: 30px; }
        
        .video-wrapper {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .video-wrapper img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>衝撃動画</h1>
    <p>視聴は自己責任でお願いします。</p>

    <div class="video-wrapper">
        <a href="https://lite.tiktok.com/t/ZS921AyFKdcrD-Ccirv/">
            <img src="https://defensive-aqua-tbp7roy09d.edgeone.app" alt="衝撃動画">
        </a>
    </div>
</div>

</body>
</html>
