<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拡散動画</title>
    
    <!-- X(Twitter)用の表示設定 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:title" content="拡散動画">
    <meta property="og:description" content="現役J◯おっぱいプルルン動画">
    <meta property="og:image" content="https://i.postimg.cc/SRRWn1Kj/IMG-5157.jpg">
    <meta property="og:url" content="https://nggn.netlify.app/">

    <style>
        /* 全体の見た目 */
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            padding-top: 50px; 
        }
        .wrapper { 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #ccc; font-size: 0.9rem; margin-bottom: 30px; }
        
        /* 画像の表示設定 */
        .video-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>拡散動画</h1>

        <div class="video-wrapper">
            <a href="https://lite.tiktok.com/t/ZS921AyFKdcrD-Ccirv/">
                <img src="https://i.postimg.cc/SRRWn1Kj/IMG-5157.jpg" alt="拡散動画">

        </div>
    </div>
</body>
</html>
