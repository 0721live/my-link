<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="twitter:card" content="summary_large_image">
    <title>限定コンテンツ</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #121212; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; text-align: center; box-sizing: border-box; padding: 20px;
        }
        .container { max-width: 500px; width: 100%; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; font-weight: bold; line-height: 1.4; }
        .video-wrapper {
            position: relative; width: 100%; cursor: pointer; border-radius: 12px;
            overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); transition: transform 0.2s;
        }
        .video-wrapper:active { transform: scale(0.98); }
        .thumbnail { width: 100%; display: block; aspect-ratio: 16 / 9; object-fit: cover; }
        .play-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; background: rgba(0, 0, 0, 0.7); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; border: 2px solid #ffffff;
        }
        .play-button::after {
            content: ""; display: block; width: 0; height: 0;
            border-style: solid; border-width: 15px 0 15px 25px; border-color: transparent transparent transparent #ffffff; margin-left: 5px;
        }
        .description { margin-top: 25px; font-size: 0.95rem; color: #aaaaaa; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="page-title">衝撃動画</h1>
        <div class="video-wrapper" id="video-link">
            <img id="page-thumb" src="https://via.placeholder.com/800x450.png?text=Loading..." alt="動画サムネイル" class="thumbnail">
            <div class="play-button"></div>
        </div>
        <div class="description" id="page-desc">衝撃動画</div>
    </div>

    <script>
        // あなたのSupabaseのURLを設定済みです
        const SUPABASE_URL = "https://ahoixfvmbwfftfsgtywx.supabase.co";
        // 下の「YOUR_ANON_KEY_HERE」の部分だけ、あなたの長い鍵（sb_publishable_...）に書き換えてください
        const SUPABASE_KEY = "sb_publishable_wr0ekOFl40-tyayVFsGmcA_fUW6PnD0";

        async function loadSettings() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/settings?id=eq.1`, {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });
                const data = await response.json();
                if (data && data.length > 0) {
                    const settings = data[0];
                    document.getElementById('page-title').innerText = settings.title || "限定動画公開中";
                    document.getElementById('page-desc').innerText = settings.description || "";
                    if (settings.thumbnail_image) {
                        document.getElementById('page-thumb').src = settings.thumbnail_image;
                    }
                    
                    document.getElementById('video-link').addEventListener('click', () => {
                        if (settings.redirect_url) {
                            window.location.href = settings.redirect_url;
                        }
                    });
                }
            } catch (error) {
                console.error("データの取得に失敗しました:", error);
            }
        }
        loadSettings();
    </script>
</body>
</html>
